name: Agent Implement

on:
  issues:
    types: [labeled]

jobs:
  implement:
    if: github.event.label.name == 'agent:implement'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    concurrency:
      group: agent-implement-issue-${{ github.event.issue.number }}
      cancel-in-progress: false
    permissions:
      contents: write
      issues: write
      pull-requests: write

    env:
      ISSUE_NUMBER: ${{ github.event.issue.number }}
      ISSUE_TITLE: ${{ github.event.issue.title }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_REPO: ${{ github.repository }}
      BASE_BRANCH: ${{ github.event.repository.default_branch }}

    steps:
      - name: Detect issue shape
        id: shape
        run: |
          set -euo pipefail
          sub_count=$(gh api "repos/${GH_REPO}/issues/${ISSUE_NUMBER}/sub_issues" --jq 'length' 2>/dev/null || echo "0")
          if [ "$sub_count" != "0" ]; then
            echo "proceed=false" >> "$GITHUB_OUTPUT"
          else
            echo "proceed=true" >> "$GITHUB_OUTPUT"
          fi
          echo "sub_count=$sub_count" >> "$GITHUB_OUTPUT"

      - name: Refuse PRD-shaped issue
        if: steps.shape.outputs.sub_count != '0'
        run: |
          gh issue edit "$ISSUE_NUMBER" --remove-label "agent:implement" || true
          gh issue edit "$ISSUE_NUMBER" --add-label "agent:blocked" || true
          gh issue comment "$ISSUE_NUMBER" --body "Refused to run: issue #${ISSUE_NUMBER} has sub-issues. Label a leaf sub-issue (a build ticket) instead."

      - name: Preflight existing PR
        if: steps.shape.outputs.proceed == 'true'
        id: preflight
        run: |
          set -euo pipefail
          existing=$(gh pr list \
            --state open \
            --search "in:body \"#${ISSUE_NUMBER}\"" \
            --json number,url,body,author \
            --jq "[.[] | select(.body | test(\"(?i)(closes|fixes|resolves)\\\\s+#${ISSUE_NUMBER}\\\\b\"))]")
          count=$(echo "$existing" | jq 'length')
          refused=false
          existing_pr_url=""
          for i in $(seq 0 $((count - 1))); do
            author=$(echo "$existing" | jq -r ".[$i].author.login")
            # Only PRs from collaborators block the agent; outside contributors don't count.
            if gh api "repos/${GH_REPO}/collaborators/${author}" --silent 2>/dev/null; then
              refused=true
              existing_pr_url=$(echo "$existing" | jq -r ".[$i].url")
              break
            fi
          done
          echo "refused=$refused" >> "$GITHUB_OUTPUT"
          echo "existing_pr_url=$existing_pr_url" >> "$GITHUB_OUTPUT"

      - name: Refuse existing PR
        if: steps.preflight.outputs.refused == 'true'
        env:
          EXISTING_PR_URL: ${{ steps.preflight.outputs.existing_pr_url }}
        run: |
          gh issue edit "$ISSUE_NUMBER" --remove-label "agent:implement" || true
          gh issue comment "$ISSUE_NUMBER" --body "Refused to run: $EXISTING_PR_URL already targets this issue. Close it first, then re-add \`agent:implement\`."

      - name: Transition labels
        if: steps.shape.outputs.proceed == 'true' && steps.preflight.outputs.refused != 'true'
        run: |
          gh issue edit "$ISSUE_NUMBER" --remove-label "agent:implement" || true
          gh issue edit "$ISSUE_NUMBER" --remove-label "agent:blocked" || true
          gh issue edit "$ISSUE_NUMBER" --add-label "agent:in-progress"

      - name: Checkout the base branch
        if: steps.shape.outputs.proceed == 'true' && steps.preflight.outputs.refused != 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0
          token: ${{ secrets.AGENT_PAT || secrets.GITHUB_TOKEN }}
          # The agent runs unsandboxed with this checkout as its cwd, so never
          # leave the token in .git/config where injected text could reach it.
          # The push step below re-authenticates explicitly.
          persist-credentials: false

      - name: Compute branch name
        if: steps.shape.outputs.proceed == 'true' && steps.preflight.outputs.refused != 'true'
        id: branch
        run: |
          slug=$(echo "$ISSUE_TITLE" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9]+/-/g; s/^-+|-+$//g' | cut -c1-50)
          branch="agent/issue-${ISSUE_NUMBER}-${slug}"
          echo "name=$branch" >> "$GITHUB_OUTPUT"

      - name: Create branch
        if: steps.shape.outputs.proceed == 'true' && steps.preflight.outputs.refused != 'true'
        env:
          BRANCH: ${{ steps.branch.outputs.name }}
        run: |
          git config user.name "sandcastle-agent[bot]"
          git config user.email "sandcastle-agent[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"

      - name: Setup Node.js
        if: steps.shape.outputs.proceed == 'true' && steps.preflight.outputs.refused != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        if: steps.shape.outputs.proceed == 'true' && steps.preflight.outputs.refused != 'true'
        run: npm ci


      - name: Install Claude Code
        if: steps.shape.outputs.proceed == 'true' && steps.preflight.outputs.refused != 'true'
        # Pinned so upgrades are deliberate; bump this version on purpose.
        run: npm install -g @anthropic-ai/claude-code@2.1.205

      - name: Run implementation agent
        if: steps.shape.outputs.proceed == 'true' && steps.preflight.outputs.refused != 'true'
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          BRANCH: ${{ steps.branch.outputs.name }}
          OUTPUT_DIR: ${{ runner.temp }}
        run: npx tsx .sandcastle/agent-workflows/implement/implement.ts

      - name: Push branch
        if: steps.shape.outputs.proceed == 'true' && steps.preflight.outputs.refused != 'true' && success()
        env:
          BRANCH: ${{ steps.branch.outputs.name }}
          # The checkout no longer persists credentials, so authenticate the
          # push explicitly. Match the checkout token (AGENT_PAT preferred) so
          # the branch is pushed by the same identity that opens the PR.
          GH_TOKEN: ${{ secrets.AGENT_PAT || secrets.GITHUB_TOKEN }}
        run: |
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GH_REPO}.git"
          git push --force origin "$BRANCH"

      - name: Open PR
        if: steps.shape.outputs.proceed == 'true' && steps.preflight.outputs.refused != 'true' && success()
        id: open_pr
        env:
          BRANCH: ${{ steps.branch.outputs.name }}
          # Author the PR as AGENT_PAT (a real user) instead of GITHUB_TOKEN
          # (github-actions[bot]). A bot-authored PR makes GitHub gate its CI and
          # review runs behind the "approve workflows to run" prompt; a
          # user-authored one runs them directly. Falls back to GITHUB_TOKEN.
          GH_TOKEN: ${{ secrets.AGENT_PAT || secrets.GITHUB_TOKEN }}
        run: |
          title="Fix #${ISSUE_NUMBER}: ${ISSUE_TITLE}"
          title="${title:0:256}"
          body_file="${RUNNER_TEMP}/pr-body.md"
          {
            echo "Closes #${ISSUE_NUMBER}"
            echo
            echo "Implemented by the Sandcastle agent workflow."
          } > "$body_file"
          # No --draft: draft PRs are unsupported on free private repos. No pipe to
          # tail either — it masked gh failures as success (the step's exit code
          # would come from tail, not gh).
          pr_url=$(gh pr create --base "$BASE_BRANCH" --head "$BRANCH" --title "$title" --body-file "$body_file")
          echo "pr_number=$(basename "$pr_url")" >> "$GITHUB_OUTPUT"

      - name: Request automated review
        if: steps.shape.outputs.proceed == 'true' && steps.preflight.outputs.refused != 'true' && success()
        env:
          PR_NUMBER: ${{ steps.open_pr.outputs.pr_number }}
          AGENT_PAT: ${{ secrets.AGENT_PAT }}
          GITHUB_TOKEN_FALLBACK: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Events created with GITHUB_TOKEN never trigger other workflows
          # (GitHub anti-recursion), so agent-review.yml only fires when the
          # label is applied with AGENT_PAT. The fallback still applies the
          # label for state tracking, but the chain stops there, so tell a
          # human how to kick off the review.
          set +e
          if [ -n "$AGENT_PAT" ]; then
            GH_TOKEN="$AGENT_PAT" gh pr edit "$PR_NUMBER" --add-label "agent:review"
            status=$?
            if [ "$status" -eq 0 ]; then
              exit 0
            fi
          fi
          GH_TOKEN="$GITHUB_TOKEN_FALLBACK" gh pr edit "$PR_NUMBER" --add-label "agent:review"
          GH_TOKEN="$GITHUB_TOKEN_FALLBACK" gh pr comment "$PR_NUMBER" --body "Applied \`agent:review\` with \`GITHUB_TOKEN\`, which cannot trigger workflows, so the automated review will not start on its own. Configure the \`AGENT_PAT\` secret to enable auto-triggering, or remove and re-add the \`agent:review\` label to run the review manually."

      - name: Mark blocked on failure
        if: steps.shape.outputs.proceed == 'true' && steps.preflight.outputs.refused != 'true' && failure()
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          reason="(no reason file written; check workflow logs)"
          if [ -f "${RUNNER_TEMP}/failure_reason.txt" ]; then
            reason=$(cat "${RUNNER_TEMP}/failure_reason.txt")
          fi
          body_file="${RUNNER_TEMP}/failure-comment.md"
          printf '`agent:implement` run failed.\n\n**Reason:** %s\n\n**Workflow run:** %s\n\nRe-add `agent:implement` to retry.\n' "$reason" "$RUN_URL" > "$body_file"
          gh issue edit "$ISSUE_NUMBER" --add-label "agent:blocked" || true
          gh issue comment "$ISSUE_NUMBER" --body-file "$body_file"

      - name: Always remove in-progress
        if: always() && steps.shape.outputs.proceed == 'true' && steps.preflight.outputs.refused != 'true'
        run: gh issue edit "$ISSUE_NUMBER" --remove-label "agent:in-progress" || true
