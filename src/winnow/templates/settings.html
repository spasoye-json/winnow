{% extends "base.html" %}

{% block content %}
<p><a href="/">&larr; Back to feed</a></p>

<header>
  <h1>Settings</h1>
  <p>Tune what "good" means. Changes re-rank the feed instantly, no re-scoring.</p>
</header>

<form method="post" action="/settings">
  <h2>Scoring</h2>
  <label>
    Quality threshold
    <input type="range" name="threshold" min="0" max="10" step="0.1"
           value="{{ threshold_display }}" />
    <output>{{ threshold_display }}</output>
  </label>

  <fieldset>
    <legend>Rubric weights (%)</legend>
    {% for w in weights %}
    <label>
      {{ w.label }}
      <input type="number" name="{{ w.key }}" min="0" max="100" step="1"
             value="{{ w.percent }}" />
    </label>
    {% endfor %}
  </fieldset>

  <button type="submit">Save</button>
</form>
{% endblock %}
